[default]
env = "dev"
log_format = ""
log_max_length = 1048576
snowball_agent = { forward_top_k = 200, backward_top_k = 200, snippet_top_k = 200 }
# concurrency=1 is mandatory: the Semantic Scholar free-tier key
# (granted 2026-05-19) enforces a **1 request / second CUMULATIVE**
# rate limit across ALL endpoints (paper search + snippet search
# both count against the same budget). Going above 1 here causes
# almost-immediate 429s that burn the retry budget. The s2_retry
# wrapper + retry_attempts=5 + max_seconds_to_wait=30 still handle
# the occasional 429 from unlucky timing slips. Bump back to 10
# only after upgrading to a paid S2 plan with a higher quota.
s2_api = { concurrency = 1, timeout = 20, total_papers_limit = 1000, total_citations_limit = 1000, retry_attempts = 5, max_seconds_to_wait = 30.0 }
# OpenAlex retrieval arm. `mailto` is optional but strongly recommended -
# it opts the service into the OpenAlex "polite pool" (higher rate limits
# + priority). Override via env: OPENALEX_MAILTO=ops@yourdomain.com.
# Set `enabled = false` to disable the OpenAlex arm entirely if it
# misbehaves.
openalex = { mailto = "", timeout = 15, fast_broad_search_top_k = 25, enabled = true }
# PubMed (NCBI eutils): free, biomedical. Without `api_key` you get 3
# req/s; with it 10 req/s. Set PUBMED_API_KEY + PUBMED_CONTACT_EMAIL
# env vars on Azure App Service. Strongest individual source for
# biomedical queries, so we run it with a higher top-k.
pubmed = { api_key = "", contact_email = "", fast_broad_search_top_k = 25, enabled = true }
# arXiv: free, preprints. Polite limit 1 req per 3s.
arxiv = { timeout = 20, fast_broad_search_top_k = 25, enabled = true }
# Google Scholar via SerpAPI: paid. `enabled = true` here is SAFE
# even when SERPAPI_API_KEY isn't set — the fetcher short-circuits to
# [] when client.is_available() is False, so the arm contributes
# nothing instead of erroring. Flip to false only if you want to
# stop attempting Scholar even when a key IS present (e.g. cost
# control).
scholar = { api_key = "", fast_broad_search_top_k = 20, enabled = true }
# Tavily web search: same pattern as Scholar. Safe to keep enabled;
# the fetcher silently no-ops without TAVILY_API_KEY.
tavily = { api_key = "", fast_broad_search_top_k = 15, enabled = true }
response_text_top_k = 10
run_snowball_for_recent = true
run_snowball_for_central = true
cohere = { rerank_model_name = "rerank-english-v3.0" }
assume_recent_and_central_first = true
consider_original_order = false
should_sort = true
cache = { enabled = true, ttl = 600 }
force_deterministic = false
enable_llm_cache = false
operative_timeout = 86400
show_api_swagger = true
time_to_wait_for_results = 0

[default.di]
round_scope_timeout = 86400 # 24 hours

[default.llm_abstraction]
gpt4o_default_model = "gpt-4o-2024-11-20"
gpt4turbo_default_model = "gpt-4-turbo"
gpt4_default_model = "gpt-4-0125-preview"
claude37sonnet_default_model = "claude-3-7-sonnet-20250219"
gemini2flash_default_model = "gemini-2.0-flash"
temparature = 1.0
n = 1
batch_max_concurrency = 1

[default.vespa]
# concurrency=1 — see the long comment on `s2_api.concurrency` above.
# `VespaRetriever` actually calls Semantic Scholar's snippet-search
# endpoint (despite the name), so it shares the same 1 req/sec
# cumulative S2 budget.
concurrency = 1
timeout = 60

[default.dense_agent]
formulation_model_name = "openai:gpt5mini-medium-reasoning-default"
initial_queries_to_formulate = 5
initial_top_k_per_query = 250
reformulate_prompt_num_queries = 5
reformulate_prompt_example_docs = 3
reformulate_top_k = 250
dense_agent_max_iterations = 2

[default.broad_search_agent]
max_iterations = 3
llm_n_suggestions = 5

[default.relevance_judgement]
relevance_model_name = "openai:gpt5mini-minimal-reasoning-default"
openai_concurrency = 75
quota = 250
highly_relevant_cap = 50
window_size = 20
initial_batch_size = 20
uniform_preload_size = 5
decay_factor = 0.95
batch_growth_factor = 2
plot = false
optimal_solution = false
# Flipped to true 2026-05-18: PaperFinder's LLM relevance judgement
# is too strict for our deployment. With strict mode (=false), broad
# lexical matches from OpenAlex (no snippets to enrich the LLM
# context) routinely all get judged below threshold-1 and the final
# doc_collection becomes empty - users see "I didn't find papers
# matching your query" even when OpenAlex returned 25 reasonable
# candidates. Flipping this to true lowers the keep-threshold to 0
# so any doc that received ANY relevance score (including 0) passes
# through. Downstream callers (chatbot-ui lit-scout) do their own
# LLM relevance pass anyway, so they're happy to get the broader
# candidate set + judge it themselves.
keep_irrelevant_docs = true

[default.query_analyzer_agent]
llm_abstraction_model_name = "openai:gpt5mini-medium-reasoning-default"
force_broad = false

[default.metadata_planner_agent]
llm_model_name = "openai:gpt4o-default"
ops_max_concurrency = 50

[default.broad_search_by_keyword_agent]
results_limit = 50
extra_results_factor = 4
formulation_model_name = "openai:gpt5mini-medium-reasoning-default"

[default.specific_paper_by_title_agent]
llm_model_name = "google:gemini3flash-medium-reasoning-default"
should_sort = false

[default.specific_paper_by_name_agent]
should_sort = false
filter_threshold = 1.0

[default.search_by_author_agent]
llm_model_name = "openai:gpt5mini-medium-reasoning-default"
relevance_judgements_quota = 75
limit_for_specific = 2
limit_for_broad = 1000
disambiguate_authors = false
consider_profiles_per_author = 20

[default.llm_suggestion_agent]
llm_model_name = "google:gemini3flash-medium-reasoning-default"
openai_concurrency = 75
fallback_n_suggestions = 10
